# --- Основной домен: localhost ---
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/site.zone/htdocs/www

    <Directory /var/www/site.zone/htdocs/www>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/localhost_error.log
    CustomLog ${APACHE_LOG_DIR}/localhost_access.log combined
</VirtualHost>

